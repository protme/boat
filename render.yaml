services:
  - type: web
    name: moontvplus
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: USERNAME
        generateValue: true
      - key: PASSWORD
        generateValue: true
      - key: NEXT_PUBLIC_STORAGE_TYPE
        value: upstash
      - key: UPSTASH_URL
        sync: false
      - key: UPSTASH_TOKEN
        sync: false
      - key: NEXT_PUBLIC_SITE_NAME
        value: MoonTVPlus
      - key: CRON_PASSWORD
        value: mtvpls
